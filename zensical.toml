# =============================================================================
# Shuttle documentation — Zensical configuration
# =============================================================================

[project]
site_name = "Shuttle"
site_url = "https://enwaiax.github.io/shuttle/"
site_description = "Secure SSH gateway for AI assistants"

repo_name = "enwaiax/shuttle"
repo_url = "https://github.com/enwaiax/shuttle"
edit_uri = "edit/main/docs"

copyright = "&copy; 2025-2026 enwaiax"

extra_css = ["stylesheets/extra.css"]

nav = [
    { "Home" = "index.md" },
    { "MCP Setup" = "mcp-setup.md" },
    { "Configuration" = "configuration.md" },
    { "Security Rules" = "security-rules.md" },
    { "Web Panel" = "web-panel.md" },
    { "API Reference" = "api.md" },
    { "Troubleshooting" = "troubleshooting.md" },
]

# -----------------------------------------------------------------------------
# Theme
# -----------------------------------------------------------------------------

[project.theme]
# Logo/favicon must live as real files under docs/ (not symlinks): Zensical does not copy symlink targets into site/.
logo = "assets/images/logo.svg"
favicon = "assets/images/favicon.svg"
features = [
    "content.action.edit",
    "content.code.copy",
    "content.code.select",
    "navigation.instant",
    "navigation.tracking",
    "navigation.sections",
    "navigation.path",
    "navigation.top",
    "search.highlight",
    "toc.follow",
]

[project.theme.icon]
repo = "fontawesome/brands/github"

[[project.theme.palette]]
scheme = "slate"
primary = "custom"
accent = "lime"
toggle.icon = "material/brightness-4"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
scheme = "default"
primary = "custom"
accent = "lime"
toggle.icon = "material/brightness-7"
toggle.name = "Switch to dark mode"

# -----------------------------------------------------------------------------
# Extra
# -----------------------------------------------------------------------------

[project.extra]
generator = false
