name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g., 0.2.0)"
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Update version in pyproject.toml
        run: |
          sed -i 's/version = "[^"]*"/version = "${{ github.event.inputs.version }}"/' pyproject.toml

      - name: Install and test
        run: |
          uv sync --all-extras --dev
          uv run pytest tests/ -v --tb=short
          uv run ruff check src/ tests/

      - name: Build frontend
        run: |
          cd web
          npm ci
          npm run build

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        run: uv publish
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit, tag, and push
        run: |
          git add pyproject.toml
          git commit -m "chore: release v${{ github.event.inputs.version }}"
          git tag -a "v${{ github.event.inputs.version }}" -m "v${{ github.event.inputs.version }}"
          git push origin main --follow-tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: Shuttle v${{ github.event.inputs.version }}
          body: |
            ## Shuttle v${{ github.event.inputs.version }}

            ### Install

            ```bash
            uvx shuttle-mcp
            # or
            pip install shuttle-mcp==${{ github.event.inputs.version }}
            ```

            ### What's new

            See [CHANGELOG.md](https://github.com/enwaiax/shuttle/blob/main/CHANGELOG.md) for details.
          draft: false
          prerelease: false
          files: dist/*
