name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g., 0.2.0)"
        required: true
        type: string

concurrency:
  group: release
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Test ────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python
        run: uv python install 3.12

      - name: Install and test
        run: |
          uv sync --all-extras --dev
          uv run ruff check src/shuttle/ tests/
          uv run pytest tests/ -v --tb=short

  # ── Build ───────────────────────────────────────────
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python
        run: uv python install 3.12

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Update version
        run: |
          sed -i 's/^version = "[^"]*"/version = "${{ inputs.version }}"/' pyproject.toml
          sed -i 's/^__version__ = "[^"]*"/__version__ = "${{ inputs.version }}"/' src/shuttle/__init__.py

      - name: Build frontend
        run: cd web && npm ci && npm run build

      - name: Build package
        run: uv build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ── Publish ─────────────────────────────────────────
  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/shuttle-mcp
    permissions:
      id-token: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Publish to PyPI
        run: uv publish dist/*
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}

  # ── Tag + GitHub Release ────────────────────────────
  github-release:
    needs: [build, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Update version and commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          sed -i 's/^version = "[^"]*"/version = "${{ inputs.version }}"/' pyproject.toml
          sed -i 's/^__version__ = "[^"]*"/__version__ = "${{ inputs.version }}"/' src/shuttle/__init__.py
          git add pyproject.toml src/shuttle/__init__.py
          git diff --cached --quiet || git commit -m "chore: release v${{ inputs.version }}"
          git tag -a "v${{ inputs.version }}" -m "v${{ inputs.version }}"
          git push origin main --follow-tags

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: Shuttle v${{ inputs.version }}
          body: |
            ## Shuttle v${{ inputs.version }}

            ### Install

            ```bash
            uvx shuttle-mcp
            # or
            pip install shuttle-mcp==${{ inputs.version }}
            ```

            See [CHANGELOG.md](https://github.com/enwaiax/shuttle/blob/main/CHANGELOG.md) for details.
          draft: false
          prerelease: false
          files: dist/*
